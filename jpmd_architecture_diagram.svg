
<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;font-family:var(--font-sans)">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D9E75"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF9F27"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888780"/>
    </marker>
  </defs>

  <!-- Institutional Client box -->
  <rect x="20" y="110" width="110" height="56" rx="8" fill="#1D9E7518" stroke="#1D9E75" stroke-width="0.75"/>
  <text x="75" y="134" text-anchor="middle" font-size="12" font-weight="500" fill="#1D9E75">Institutional</text>
  <text x="75" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#1D9E75">Client</text>
  <text x="75" y="175" text-anchor="middle" font-size="10" fill="#5F5E5A">e.g. BMW, Siemens</text>

  <!-- JPMorgan box -->
  <rect x="390" y="110" width="110" height="56" rx="8" fill="#37AABB18" stroke="#185FA5" stroke-width="0.75"/>
  <text x="445" y="134" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5">J.P. Morgan</text>
  <text x="445" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#185FA5">Bank</text>
  <text x="445" y="175" text-anchor="middle" font-size="10" fill="#5F5E5A">USD deposit custodian</text>

  <!-- Base chain box -->
  <rect x="195" y="30" width="130" height="50" rx="8" fill="#53308718" stroke="#534AB7" stroke-width="0.75"/>
  <text x="260" y="52" text-anchor="middle" font-size="12" font-weight="500" fill="#7F77DD">Base (L2)</text>
  <text x="260" y="68" text-anchor="middle" font-size="10" fill="#7F77DD">Public blockchain</text>

  <!-- JPMD token circle -->
  <circle cx="260" cy="168" r="36" fill="#EF9F2718" stroke="#EF9F27" stroke-width="0.75"/>
  <text x="260" y="163" text-anchor="middle" font-size="13" font-weight="500" fill="#EF9F27">JPMD</text>
  <text x="260" y="179" text-anchor="middle" font-size="10" fill="#BA7517">Deposit Token</text>

  <!-- Arrow: Client deposits USD to JPM -->
  <line x1="130" y1="148" x2="388" y2="138" stroke="#888780" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <text x="260" y="126" text-anchor="middle" font-size="10" fill="#888780">① Deposit USD</text>

  <!-- Arrow: JPM mints JPMD on Base -->
  <line x1="420" y1="110" x2="290" y2="80" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <text x="385" y="88" text-anchor="middle" font-size="10" fill="#7F77DD">② Mint on Base</text>

  <!-- Arrow: JPMD sent to client -->
  <line x1="224" y1="168" x2="132" y2="155" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arr2)"/>
  <text x="172" y="185" text-anchor="middle" font-size="10" fill="#EF9F27">③ Receive token</text>

  <!-- Arrow: Client redeems -->
  <line x1="130" y1="158" x2="222" y2="175" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="160" y="205" text-anchor="middle" font-size="10" fill="#1D9E75">④ Redeem → USD</text>

  <!-- Arrow: Base to JPMD token -->
  <line x1="260" y1="80" x2="260" y2="130" stroke="#534AB7" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr3)"/>

  <!-- Bottom stat row -->
  <rect x="20" y="245" width="148" height="52" rx="6" fill="#1D1D1D" stroke="#444441" stroke-width="0.5"/>
  <text x="94" y="266" text-anchor="middle" font-size="10" fill="#888780">AVG DAILY VOLUME</text>
  <text x="94" y="285" text-anchor="middle" font-size="16" font-weight="500" fill="#EF9F27">$5B+</text>

  <rect x="186" y="245" width="148" height="52" rx="6" fill="#1D1D1D" stroke="#444441" stroke-width="0.5"/>
  <text x="260" y="266" text-anchor="middle" font-size="10" fill="#888780">CUMULATIVE SINCE 2019</text>
  <text x="260" y="285" text-anchor="middle" font-size="16" font-weight="500" fill="#EF9F27">$1.5T+</text>

  <rect x="352" y="245" width="148" height="52" rx="6" fill="#1D1D1D" stroke="#444441" stroke-width="0.5"/>
  <text x="426" y="266" text-anchor="middle" font-size="10" fill="#888780">SETTLEMENT</text>
  <text x="426" y="285" text-anchor="middle" font-size="16" font-weight="500" fill="#1D9E75">24/7</text>

  <!-- Source label -->
  <text x="260" y="312" text-anchor="middle" font-size="9" fill="#444441">Source: JPMorgan official disclosures, Tiger Research</text>
</svg>
